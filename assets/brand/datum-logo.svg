<svg width="680" height="340" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>DATUM logo</title>
  <desc>Logo for DATUM, a modern database client app.</desc>

  <defs>
    <style>
      .logo-bg { fill: #0d1117; }
      .node-main { fill: #00c4ff; }
      .node-sec { fill: #1e3a4a; stroke: #00c4ff; stroke-width: 1.5; }
      .edge { stroke: #00c4ff; stroke-width: 1.5; fill: none; opacity: 0.5; }
      .edge-dim { stroke: #1a4a5e; stroke-width: 1; fill: none; }
      .wordmark { font-family: 'Courier New', Courier, monospace; font-size: 72px; font-weight: 700; fill: #e8f4f8; letter-spacing: 12px; }
      .tagline { font-family: 'Courier New', Courier, monospace; font-size: 13px; font-weight: 400; fill: #3a6a7a; letter-spacing: 4px; }
      .dot-accent { fill: #00c4ff; }
    </style>
  </defs>

  <rect width="680" height="340" rx="16" class="logo-bg"/>

  <!-- Central node (primary table) -->
  <rect x="88" y="130" width="64" height="36" rx="6" class="node-main" opacity="0.95"/>
  <rect x="93" y="136" width="54" height="6" rx="2" fill="#0d1117" opacity="0.4"/>
  <rect x="93" y="146" width="38" height="4" rx="2" fill="#0d1117" opacity="0.25"/>
  <rect x="93" y="153" width="44" height="4" rx="2" fill="#0d1117" opacity="0.25"/>

  <!-- Top node -->
  <rect x="148" y="64" width="56" height="32" rx="6" class="node-sec"/>
  <rect x="153" y="70" width="46" height="5" rx="2" fill="#00c4ff" opacity="0.5"/>
  <rect x="153" y="79" width="32" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>
  <rect x="153" y="86" width="38" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>

  <!-- Bottom node -->
  <rect x="148" y="224" width="56" height="32" rx="6" class="node-sec"/>
  <rect x="153" y="230" width="46" height="5" rx="2" fill="#00c4ff" opacity="0.5"/>
  <rect x="153" y="239" width="32" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>
  <rect x="153" y="246" width="38" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>

  <!-- Right-top node -->
  <rect x="230" y="90" width="56" height="32" rx="6" class="node-sec"/>
  <rect x="235" y="96" width="46" height="5" rx="2" fill="#00c4ff" opacity="0.5"/>
  <rect x="235" y="105" width="32" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>
  <rect x="235" y="112" width="38" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>

  <!-- Right-bottom node -->
  <rect x="230" y="198" width="56" height="32" rx="6" class="node-sec"/>
  <rect x="235" y="204" width="46" height="5" rx="2" fill="#00c4ff" opacity="0.5"/>
  <rect x="235" y="213" width="32" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>
  <rect x="235" y="220" width="38" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>

  <!-- Far right node -->
  <rect x="272" y="144" width="52" height="32" rx="6" class="node-sec"/>
  <rect x="277" y="150" width="42" height="5" rx="2" fill="#00c4ff" opacity="0.5"/>
  <rect x="277" y="159" width="28" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>
  <rect x="277" y="166" width="34" height="4" rx="2" fill="#00c4ff" opacity="0.3"/>

  <!-- Edges -->
  <line x1="152" y1="130" x2="176" y2="96" class="edge"/>
  <line x1="152" y1="166" x2="176" y2="240" class="edge"/>
  <line x1="204" y1="80" x2="230" y2="100" class="edge"/>
  <line x1="204" y1="230" x2="230" y2="220" class="edge"/>
  <line x1="286" y1="122" x2="286" y2="144" class="edge"/>
  <line x1="286" y1="198" x2="286" y2="176" class="edge"/>
  <line x1="204" y1="80" x2="258" y2="144" class="edge-dim"/>
  <line x1="204" y1="240" x2="258" y2="176" class="edge-dim"/>

  <!-- FK dot connectors -->
  <circle cx="164" cy="114" r="3" class="dot-accent"/>
  <circle cx="164" cy="152" r="3" class="dot-accent"/>
  <circle cx="218" cy="88" r="3" class="dot-accent"/>
  <circle cx="218" cy="233" r="3" class="dot-accent"/>

  <!-- Separator -->
  <line x1="338" y1="80" x2="338" y2="270" stroke="#1a3a4a" stroke-width="1" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="356" y="200" class="wordmark" text-anchor="middle">DATUM</text>
  <text x="356" y="228" class="tagline" text-anchor="middle">database client</text>
</svg>
